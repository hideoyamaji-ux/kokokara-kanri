<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>現場写真アップロード</title>
  <link rel="manifest" href="upload_manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 16px;
      color: #1a202c;
    }
    .header {
      background: #2563eb;
      color: white;
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .vendor-info {
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      border-left: 4px solid #2563eb;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .vendor-info .label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .vendor-info .vendor-name { font-size: 20px; font-weight: 700; color: #1e40af; }
    .vendor-info .vendor-code { font-size: 13px; color: #94a3b8; margin-top: 4px; }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      color: #dc2626;
      text-align: center;
    }
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .section-title { font-size: 14px; font-weight: 700; color: #374151; margin-bottom: 12px; }
    select, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      color: #1a202c;
      background: #f9fafb;
      appearance: none;
    }
    select:focus, textarea:focus { outline: none; border-color: #2563eb; background: white; }
    textarea { resize: vertical; min-height: 80px; }
    .upload-area {
      border: 2px dashed #93c5fd;
      border-radius: 12px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #eff6ff;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #2563eb; background: #dbeafe; }
    .upload-icon { font-size: 40px; margin-bottom: 8px; }
    .upload-text { font-size: 15px; color: #2563eb; font-weight: 600; }
    .upload-sub { font-size: 12px; color: #64748b; margin-top: 4px; }
    #fileInput { display: none; }
    .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
    .preview-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #e5e7eb; }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-item .remove-btn {
      position: absolute; top: 4px; right: 4px;
      background: rgba(0,0,0,0.6); color: white; border: none;
      border-radius: 50%; width: 22px; height: 22px; font-size: 13px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .submit-btn {
      width: 100%; background: #2563eb; color: white; border: none;
      border-radius: 12px; padding: 16px; font-size: 17px; font-weight: 700;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    .submit-btn:hover:not(:disabled) { background: #1d4ed8; }
    .submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .progress {
      background: #dbeafe; border-radius: 8px; padding: 12px 16px;
      margin-top: 12px; text-align: center; color: #1d4ed8;
      font-size: 14px; display: none;
    }
    .success-box {
      background: #f0fdf4; border: 1px solid #86efac; border-radius: 12px;
      padding: 20px; text-align: center; margin-top: 16px; display: none;
    }
    .success-box .check { font-size: 40px; margin-bottom: 8px; }
    .success-box p { color: #16a34a; font-weight: 600; font-size: 16px; }
    .success-box .sub { color: #64748b; font-size: 13px; margin-top: 4px; }
    .reset-btn {
      background: #f1f5f9; color: #475569; border: none;
      border-radius: 8px; padding: 10px 24px; font-size: 14px;
      cursor: pointer; margin-top: 12px;
    }
    .loading-spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.5); border-top-color: white;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <h1>📷 現場写真アップロード</h1>
</div>

<div id="vendorInfo" class="vendor-info" style="display:none;">
  <div class="label">アップロード業者</div>
  <div class="vendor-name" id="vendorName">—</div>
  <div class="vendor-code" id="vendorCodeDisplay"></div>
</div>

<div id="errorBox" class="error-box" style="display:none;">
  ⚠️ <span id="errorMsg">業者情報を取得できませんでした</span>
</div>

<div id="mainForm" style="display:none;">
  <div class="section">
    <div class="section-title">📍 現場を選択</div>
    <select id="siteSelect">
      <option value="">読み込み中…</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">📸 写真を選択（複数可）</div>
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📷</div>
      <div class="upload-text">タップして写真を選択</div>
      <div class="upload-sub">またはここにドロップ</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div class="preview-grid" id="previewGrid"></div>
  </div>

  <div class="section">
    <div class="section-title">📝 メモ（任意）</div>
    <textarea id="memo" placeholder="工事内容や特記事項など"></textarea>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitPhotos()">アップロード</button>

  <div class="progress" id="progress">
    <span class="loading-spinner"></span><span id="progressText">アップロード中...</span>
  </div>

  <div class="success-box" id="successBox">
    <div class="check">✅</div>
    <p>アップロード完了！</p>
    <div class="sub" id="successDetail"></div>
    <br>
    <button class="reset-btn" onclick="resetForm()">続けてアップロード</button>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbydyrr8_1U1mL8H6ck7cpsmBCvN_0V4r7aU5Gn7U6mX6ATG9DUTjU_3v-RIbY8gTVIy8w/exec';
var vendorData = null;
var selectedFiles = [];

function getParam(name) {
  return new URLSearchParams(location.search).get(name);
}

async function loadVendor() {
  var code = getParam('code');
  if (!code) { showError('URLに ?code=XXXX が必要です'); return; }
  try {
    var res = await fetch(GAS_URL + '?action=getVendorByCode&code=' + encodeURIComponent(code));
    var data = await res.json();
    if (!data.success || !data.vendor) { showError('業者コード「' + code + '」が見つかりません'); return; }
    vendorData = data.vendor;
    document.getElementById('vendorName').textContent = vendorData['業者名'] || '不明';
    document.getElementById('vendorCodeDisplay').textContent = 'コード: ' + code;
    document.getElementById('vendorInfo').style.display = 'block';
    document.getElementById('mainForm').style.display = 'block';
    loadSites();
  } catch(e) { showError('通信エラー: ' + e.message); }
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').style.display = 'block';
}

async function loadSites() {
  try {
    var res = await fetch(GAS_URL + '?action=getSites');
    var data = await res.json();
    var sel = document.getElementById('siteSelect');
    sel.innerHTML = '<option value="">現場を選択してください</option>';
    if (data.success && data.sites) {
      data.sites.forEach(function(s) {
        var opt = document.createElement('option');
        opt.value = s.site_id;
        opt.textContent = s['現場名'] || s.site_id;
        sel.appendChild(opt);
      });
    }
  } catch(e) {
    document.getElementById('siteSelect').innerHTML = '<option value="">現場の読み込みに失敗しました</option>';
  }
}

document.getElementById('uploadArea').addEventListener('click', function() {
  document.getElementById('fileInput').click();
});
document.getElementById('uploadArea').addEventListener('dragover', function(e) {
  e.preventDefault(); this.classList.add('dragover');
});
document.getElementById('uploadArea').addEventListener('dragleave', function() {
  this.classList.remove('dragover');
});
document.getElementById('uploadArea').addEventListener('drop', function(e) {
  e.preventDefault(); this.classList.remove('dragover'); addFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change', function() {
  addFiles(this.files); this.value = '';
});

function addFiles(files) {
  Array.from(files).forEach(function(file) {
    if (!file.type.startsWith('image/')) return;
    selectedFiles.push(file);
    var reader = new FileReader();
    reader.onload = function(ev) {
      var div = document.createElement('div');
      div.className = 'preview-item';
      var idx = selectedFiles.length - 1;
      div.innerHTML = '<img src="' + ev.target.result + '"><button class="remove-btn" onclick="removeFile(' + idx + ', this)">✕</button>';
      document.getElementById('previewGrid').appendChild(div);
    };
    reader.readAsDataURL(file);
  });
}

function removeFile(idx, btn) {
  selectedFiles[idx] = null;
  btn.parentElement.remove();
}

function toBase64(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result.split(',')[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function submitPhotos() {
  var siteId = document.getElementById('siteSelect').value;
  if (!siteId) { alert('現場を選択してください'); return; }
  var validFiles = selectedFiles.filter(function(f) { return f !== null; });
  if (validFiles.length === 0) { alert('写真を選択してください'); return; }

  var btn = document.getElementById('submitBtn');
  var progress = document.getElementById('progress');
  var progressText = document.getElementById('progressText');
  btn.disabled = true;
  progress.style.display = 'block';

  var successCount = 0;
  for (var i = 0; i < validFiles.length; i++) {
    progressText.textContent = (i+1) + ' / ' + validFiles.length + ' 枚アップロード中...';
    try {
      var b64 = await toBase64(validFiles[i]);
      var payload = {
        action: 'uploadPhoto',
        site_id: siteId,
        vendor_id: vendorData.vendor_id || '',
        vendorCode: vendorData.vendorCode || '',
        fileName: validFiles[i].name,
        mimeType: validFiles[i].type,
        fileData: b64,
        memo: document.getElementById('memo').value
      };
      var res = await fetch(GAS_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      var result = await res.json();
      if (result.success) successCount++;
    } catch(e) { console.error('Upload error:', e); }
  }

  progress.style.display = 'none';
  document.getElementById('successDetail').textContent = successCount + '枚の写真をアップロードしました';
  document.getElementById('successBox').style.display = 'block';
}

function resetForm() {
  selectedFiles = [];
  document.getElementById('previewGrid').innerHTML = '';
  document.getElementById('memo').value = '';
  document.getElementById('siteSelect').value = '';
  document.getElementById('successBox').style.display = 'none';
  document.getElementById('submitBtn').disabled = false;
}

loadVendor();
</script>
</body>
      </html>
